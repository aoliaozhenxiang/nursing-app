<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 慈航护理学堂</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1b4332 0%, #2a9d8f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1b4332, #2a9d8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a2f2a;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2f0ea;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2a9d8f;
            box-shadow: 0 0 0 4px rgba(42,157,143,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 48px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(105deg, #2a9d8f 0%, #1e6f62 100%);
            color: white;
            box-shadow: 0 8px 18px rgba(42,157,143,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(42,157,143,0.4);
        }
        .btn-secondary {
            background: #e2f0ea;
            color: #2a9d8f;
        }
        .btn-secondary:hover {
            background: #d0e8e2;
        }
        .switch-mode {
            text-align: center;
            margin-top: 20px;
        }
        .switch-mode a {
            color: #2a9d8f;
            text-decoration: none;
            font-weight: 600;
        }
        .switch-mode a:hover {
            text-decoration: underline;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            color: #2a9d8f;
        }
        .error-msg {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            background: #e8f8f5;
            color: #2a9d8f;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1><i class="fas fa-hand-holding-heart"></i> 慈航护理学堂</h1>
            <p>AI赋能养老护理培训</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <!-- 登录表单 -->
        <div id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
            <div class="switch-mode">
                还没有账号？<a href="#" onclick="showRegister(); return false;">立即注册</a>
            </div>
        </div>
        
        <!-- 注册表单 -->
        <div id="registerForm" style="display:none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="regNickname" placeholder="请输入昵称（选填）">
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">
                <i class="fas fa-user-plus"></i> 注册
            </button>
            <div class="switch-mode">
                已有账号？<a href="#" onclick="showLogin(); return false;">立即登录</a>
            </div>
        </div>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://9.128.243.66:9091/api/v1';

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showSuccess('登录成功！即将跳转...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showError(data.message || '登录失败');
                }
            } catch (err) {
                showError('请求失败，请检查网络');
                console.error(err);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value.trim();

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            if (username.length < 3) {
                showError('用户名至少3个字符');
                return;
            }

            if (password.length < 6) {
                showError('密码至少6个字符');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });
                const data = await response.json();

                if (data.success) {
                    showSuccess('注册成功！请登录');
                    setTimeout(showLogin, 1500);
                } else {
                    showError(data.message || '注册失败');
                }
            } catch (err) {
                showError('请求失败，请检查网络');
                console.error(err);
            }
        }
    </script>
</body>
</html>
