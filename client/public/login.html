<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慈航护理学堂 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1b4332 0%, #2a9d8f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 32px;
            padding: 48px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1b4332, #2a9d8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            margin-bottom: 32px;
            border-radius: 16px;
            background: #f5fcf9;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        .tab.active {
            background: white;
            color: #2a9d8f;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #2a9d8f;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2f0ea;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #2a9d8f;
            box-shadow: 0 0 0 4px rgba(42,157,143,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2a9d8f 0%, #1e6f62 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 18px rgba(42,157,143,0.3);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 28px rgba(42,157,143,0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c00;
            display: block;
        }
        .message.success {
            background: #efe;
            color: #060;
            display: block;
        }
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: #2a9d8f;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1><i class="fas fa-hand-holding-heart"></i> 慈航护理学堂</h1>
            <p>AI赋能养老护理四级教学平台</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>
        
        <div id="message" class="message"></div>
        
        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名" required>
                </div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                </div>
            </div>
            <button type="submit" class="btn" id="loginBtn">登录</button>
        </form>
        
        <!-- 注册表单 -->
        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" id="regUsername" placeholder="请输入用户名（3-20位）" required minlength="3" maxlength="20">
                </div>
            </div>
            <div class="form-group">
                <label>昵称</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-badge"></i>
                    <input type="text" class="form-input" id="regNickname" placeholder="请输入昵称（选填）">
                </div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" id="regPassword" placeholder="请输入密码（6位以上）" required minlength="6">
                </div>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" id="regConfirm" placeholder="请再次输入密码" required>
                </div>
            </div>
            <button type="submit" class="btn" id="registerBtn">注册</button>
        </form>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> 返回首页（游客模式）</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:9091/api/v1';
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            document.getElementById('message').style.display = 'none';
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage('登录成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage(data.error || '登录失败', 'error');
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (err) {
                showMessage('网络错误，请检查服务器', 'error');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            const username = document.getElementById('regUsername').value;
            const nickname = document.getElementById('regNickname').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (password !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                btn.disabled = false;
                btn.textContent = '注册';
                return;
            }
            
            try {
                const res = await fetch(API_BASE + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('注册成功！请登录', 'success');
                    switchTab('login');
                    document.getElementById('loginUsername').value = username;
                    btn.disabled = false;
                    btn.textContent = '注册';
                } else {
                    showMessage(data.error || '注册失败', 'error');
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (err) {
                showMessage('网络错误，请检查服务器', 'error');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
